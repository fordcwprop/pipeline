# Staging worker: same hardened code as production, bound to the
# pre-fable-restore-test D1 (a byte-exact copy of prod deal data).
# ENVIRONMENT=production is REQUIRED here: it disables the dev admin fallback so
# the staging origin is NOT open to anonymous callers (it was leaking the full
# prod-copy deal data). To use staging, authenticate like prod (X-Proxy-Secret
# or a Cloudflare-Access request). Deploy:  wrangler deploy -c wrangler.staging.toml
name = "pipeline-backend-staging"
main = "src/index.js"
compatibility_date = "2024-09-23"

[[d1_databases]]
binding = "DB"
database_name = "pre-fable-restore-test"
database_id = "53985c61-41d2-479c-8f2a-4694b84ddc29"

[vars]
ENVIRONMENT = "production"
